<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Row Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1920px;
            margin: 10px auto;
            padding: 10px;
            background-color: #f4f4f9;
        }
        h2 { margin: 0 0 10px 0; }

        .top-bar {
            background: #fff;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .top-bar button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .top-bar button:hover { background-color: #45a049; }
        .top-bar button:disabled { background-color: #cccccc; cursor: not-allowed; }

        .goto-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }
        .goto-group input {
            width: 90px;
            padding: 8px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .main-container {
            display: flex;
            gap: 20px;
        }
        .content-container {
            flex: 0 0 59%;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
            max-height: 800px;
            overflow-y: auto;
            padding: 15px;
            border-radius: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            border: 1px solid #ddd;
            text-align: left;
            vertical-align: top;
            font-size: 14px;
        }
        th {
            background-color: #4CAF50;
            color: white;
            width: 150px;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        td {
            white-space: normal;
            word-wrap: break-word;
            max-width: 800px;
        }

        .annotation-container {
            flex: 1;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
        }
        .annotation-container label { font-weight: bold; margin: 10px 0 5px; display: block; }
        .radio-group { margin: 10px 0; }
        .radio-group label { font-weight: normal; margin-right: 15px; }

        select[multiple] {
            width: 100%;
            height: 240px !important;
            padding: 8px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        textarea {
            width: 100%;
            height: 80px;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            resize: vertical;
        }
        .evidence-field { margin-bottom: 12px; }
        #rowInfo { margin: 0 0 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>JSON Row Viewer</h2>

    <div class="top-bar">
        <input type="file" id="jsonFileInput" accept=".json" onchange="loadJSON()">
        <button onclick="showPreviousRow()" disabled id="prevButton">Previous</button>
        <button onclick="showNextRow()" disabled id="nextButton">Next</button>

        <div class="goto-group">
            <span>Go to Row:</span>
            <input type="number" id="gotoRowInput" min="1" placeholder="e.g. 42"
                   onkeydown="if(event.key==='Enter') jumpToRow()">
            <button onclick="jumpToRow()">Go</button>
        </div>

        <button onclick="saveAnnotations()">Save Annotations</button>
    </div>

    <div class="main-container">
        <div class="content-container">
            <table id="rowTable"></table>
        </div>

        <div class="annotation-container">
            <p id="rowInfo"></p>

            <label>Annotation:</label>
            <div class="radio-group">
                <label><input type="radio" name="annotationLabel" value="real" onchange="updateAnnotation()"> Real</label>
                <label><input type="radio" name="annotationLabel" value="fake" onchange="updateAnnotation()"> Fake (Misinformation)</label>
                <label><input type="radio" name="annotationLabel" value="unrelated" onchange="updateAnnotation()"> Unrelated</label>
            </div>

            <label>Reason (Hold Ctrl/Cmd for multiple):</label>
            <select id="annotationReason" multiple onchange="updateEvidenceFields()">
                <option value="human-like comment">Real: Human-like comment</option>
                <option value="human-like comment, using slang in linguistics">Real: Human-like comment, using slang in linguistics</option>
                <option value="advertisement-style review">Fake: Advertisement-style review</option>
                <option value="over emphasizing positive facts without any negative remarks">Fake: Over emphasizing positive facts without any negative remarks</option>
                <option value="too many photos, recommendations, likes, or interactions">Fake: Too many photos, recommendations, likes, or interactions</option>
                <option value="exaggerated review text, extremely high or extremely low ratings">Fake: Exaggerated review text, extremely high or low ratings</option>
                <option value="review text comparison to competitors for promote or disparage">Fake: Review text comparison to competitors for promote or disparage</option>
                <option value="template-style review sentence structure">Fake: Template-style review sentence structure</option>
                <option value="review text encourage or discourage other users to use (echo chamber effect)">Fake: Review text encourage or discourage other users to use (echo chamber effect)</option>
                <option value="newly created account with very less reviews">Fake: Newly created account with very less reviews</option>
            </select>

            <label>Sentiment:</label>
            <select id="sentiment" onchange="updateAnnotation()">
                <option value="">Select</option>
                <option value="positive">Positive</option>
                <option value="neutral">Neutral</option>
                <option value="negative">Negative</option>
            </select>

            <div id="evidenceFields"></div>
        </div>
    </div>

    <script>
    let headers = [], data = [], currentRowIndex = 0, annotations = [];

    const allReasons = [
        "human-like comment",
        "human-like comment, using slang in linguistics",
        "advertisement-style review",
        "over emphasizing positive facts without any negative remarks",
        "too many photos, recommendations, likes, or interactions",
        "exaggerated review text, extremely high or extremely low ratings",
        "review text comparison to competitors for promote or disparage",
        "template-style review sentence structure",
        "review text encourage or discourage other users to use (echo chamber effect)",
        "newly created account with very less reviews"
    ];

    function isEmpty(value) {
        return value === null || value === undefined || value === "" || value === 0;
    }

    // Smart detection: which fields are likely to contain rendered HTML
    function shouldRenderAsHtml(header, value) {
        const headerLower = header.toLowerCase();
        const valueStr = String(value || "");

        const htmlKeywords = ['opinion', 'uopin', 'review', 'comment', 'text', 'content', 'body', 'post', 'message', 'html'];
        if (htmlKeywords.some(k => headerLower.includes(k))) return true;
        if (valueStr.includes('<div') || valueStr.includes('<p') || valueStr.includes('<img')) return true;
        return false;
    }

    // === Persistence & Navigation ===
    function saveCurrentRow() {
        if (data.length > 0) {
            localStorage.setItem('lastViewedRow_' + location.pathname, currentRowIndex);
        }
    }

    function loadSavedRow() {
        if (data.length === 0) return;
        const key = 'lastViewedRow_' + location.pathname;
        const saved = localStorage.getItem(key);
        if (saved !== null) {
            const rowNum = parseInt(saved);
            if (rowNum >= 0 && rowNum < data.length) {
                currentRowIndex = rowNum;
            }
        }
    }

    function jumpToRow() {
        const input = document.getElementById('gotoRowInput');
        let target = parseInt(input.value);
        if (isNaN(target) || target < 1 || target > data.length) {
            alert(`Please enter a number between 1 and ${data.length}`);
            return;
        }
        currentRowIndex = target - 1;
        displayRow();
        saveCurrentRow();
        input.value = '';
    }

    // === Load JSON ===
    function loadJSON() {
        const file = document.getElementById('jsonFileInput').files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const loaded = JSON.parse(e.target.result);
                data = []; annotations = [];

                loaded.forEach(row => {
                    const ann = {
                        label: row.annotation || '',
                        reasons: Array.isArray(row.reasons) ? row.reasons : [],
                        sentiment: row.sentiment || '',
                        evidence: row.evidence || {}
                    };
                    allReasons.forEach(r => {
                        if (!ann.evidence.hasOwnProperty(r)) {
                            ann.evidence[r] = '';
                        }
                    });

                    const clean = { ...row };
                    delete clean.annotation; delete clean.reasons; delete clean.sentiment; delete clean.evidence;
                    data.push(clean);
                    annotations.push(ann);
                });

                headers = data.length ? Object.keys(data[0]) : [];
                const hasMultiple = data.length > 1;
                document.getElementById('prevButton').disabled = !hasMultiple;
                document.getElementById('nextButton').disabled = !hasMultiple;

                loadSavedRow();
                displayRow();
            } catch (err) {
                alert("Error loading JSON: " + err);
            }
        };
        reader.readAsText(file);
    }

    // === Annotation Update ===
    function updateAnnotation() {
        const label = document.querySelector('input[name="annotationLabel"]:checked')?.value || '';
        const reasonSelect = document.getElementById('annotationReason');
        const reasons = Array.from(reasonSelect.selectedOptions).map(opt => opt.value);
        const sentiment = document.getElementById('sentiment').value;

        const evidence = {};
        allReasons.forEach(r => {
            const textarea = document.getElementById(`evidence-${r.replace(/[^a-zA-Z0-9]/g, '-')}`);
            evidence[r] = textarea ? textarea.value.trim() : (annotations[currentRowIndex]?.evidence[r] || '');
        });

        annotations[currentRowIndex] = { label, reasons, sentiment, evidence };
    }

    // === Dynamic Evidence Fields ===
    function updateEvidenceFields() {
        const container = document.getElementById('evidenceFields');
        container.innerHTML = '';
        const selectedReasons = Array.from(document.getElementById('annotationReason').selectedOptions).map(opt => opt.value);

        selectedReasons.forEach(reason => {
            const optionEl = document.querySelector(`#annotationReason option[value="${reason}"]`);
            const displayText = optionEl ? optionEl.text : reason;

            const div = document.createElement('div');
            div.className = 'evidence-field';
            div.innerHTML = `
                <label>Evidence for ${displayText}:</label>
                <textarea id="evidence-${reason.replace(/[^a-zA-Z0-9]/g, '-')}"
                          placeholder="Separate sentences with commas"
                          oninput="updateAnnotation()">${annotations[currentRowIndex]?.evidence[reason] || ''}</textarea>
            `;
            container.appendChild(div);
        });
        updateAnnotation();
    }

    // === Display Row - FIXED VERSION ===
    function displayRow() {
        const table = document.getElementById('rowTable');
        table.innerHTML = '';
        if (!data.length) {
            table.innerHTML = '<tr><td>No data loaded</td></tr>';
            return;
        }

        const row = data[currentRowIndex];

        headers.forEach(h => {
            const value = row[h];
            if (isEmpty(value)) return;

            const tr = document.createElement('tr');
            const th = document.createElement('th');
            th.textContent = h;
            const td = document.createElement('td');

            if (shouldRenderAsHtml(h, value)) {
                td.innerHTML = value;  // Render HTML safely only for known fields
            } else {
                td.textContent = value; // Plain text for everything else
            }

            tr.appendChild(th);
            tr.appendChild(td);
            table.appendChild(tr);
        });

        document.getElementById('rowInfo').textContent = `Row ${currentRowIndex + 1} of ${data.length}`;
        document.getElementById('gotoRowInput').placeholder = `${currentRowIndex + 1}`;

        const ann = annotations[currentRowIndex] || { label: '', reasons: [], sentiment: '', evidence: {} };

        document.querySelectorAll('input[name="annotationLabel"]').forEach(r => r.checked = r.value === ann.label);
        const reasonSel = document.getElementById('annotationReason');
        for (let opt of reasonSel.options) opt.selected = ann.reasons.includes(opt.value);
        document.getElementById('sentiment').value = ann.sentiment || '';
        updateEvidenceFields();
    }

    function showNextRow() {
        currentRowIndex = (currentRowIndex + 1) % data.length;
        displayRow();
        saveCurrentRow();
    }

    function showPreviousRow() {
        currentRowIndex = (currentRowIndex - 1 + data.length) % data.length;
        displayRow();
        saveCurrentRow();
    }

    function saveAnnotations() {
        const result = data.map((row, i) => ({
            ...row,
            annotation: annotations[i].label,
            reasons: annotations[i].reasons,
            sentiment: annotations[i].sentiment,
            evidence: annotations[i].evidence
        }));

        const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'annotated_data.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
    </script>
</body>
</html>
